<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Desktop Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #17212b;        /* Боковая панель */
            --bg-chat: #0e1621;        /* Фон чата */
            --bg-active: #2b5278;      /* Активный чат */
            --text-main: #f5f5f5;
            --text-gray: #708499;
            --msg-in: #182533;
            --msg-out: #2b5278;
            --accent: #4fa4ed;
        }

        body, html { margin: 0; padding: 0; height: 100vh; font-family: sans-serif; background: var(--bg-chat); color: var(--text-main); overflow: hidden; }
        #root { display: flex; height: 100%; }

        /* --- Auth Page (Dark Style) --- */
        .auth-container { position: fixed; inset: 0; background: var(--bg-chat); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--bg-dark); padding: 40px; border-radius: 10px; width: 340px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .auth-logo { width: 120px; margin-bottom: 20px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #242f3d; background: #242f3d; color: white; outline: none; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #2481cc; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .auth-switch { margin-top: 20px; color: #64b5f6; cursor: pointer; font-size: 14px; display: block; }

        /* --- Sidebar --- */
        .sidebar { width: 320px; background: var(--bg-dark); border-right: 1px solid #0e1621; display: flex; flex-direction: column; }
        .search-area { padding: 10px 15px; }
        .search-input { width: 100%; background: #242f3d; border: none; padding: 8px 15px; border-radius: 5px; color: white; outline: none; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 10px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #202b36; }
        .chat-item.active { background: var(--bg-active); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .chat-last { color: var(--text-gray); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Main Chat --- */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg-chat); }
        .chat-header { height: 56px; background: var(--bg-dark); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #0e1621; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 20px 40px; display: flex; flex-direction: column; gap: 4px; }

        /* --- Telegram Bubbles --- */
        .message { max-width: 500px; padding: 6px 12px; font-size: 14px; line-height: 1.5; position: relative; display: flex; flex-direction: column; }
        .message.in { align-self: flex-start; background: var(--msg-in); border-radius: 10px 10px 10px 0; }
        .message.out { align-self: flex-end; background: var(--msg-out); border-radius: 10px 10px 0 10px; }
        .sender-name { font-size: 13px; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .msg-time { font-size: 11px; color: var(--text-gray); align-self: flex-end; margin-top: 4px; }
        .media-img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        /* --- Input Area --- */
        .input-bar { padding: 10px 20px; background: var(--bg-dark); display: flex; align-items: center; gap: 15px; }
        .message-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 15px; }
        .icon-btn { color: var(--text-gray); cursor: pointer; font-size: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-root"></div>
<div id="app-root" class="hidden" style="height: 100%;">
    <div class="sidebar">
        <div class="search-area"><input type="text" class="search-input" placeholder="Поиск"></div>
        <div class="chat-list">
            <div class="chat-item active">
                <img src="https://cdn-icons-png.flaticon.com/512/134/134914.png" class="avatar">
                <div class="chat-info">
                    <div class="chat-name">Death Star 3.0</div>
                    <div class="chat-last" id="side-preview">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
    <div class="chat-view">
        <div class="chat-header">
            <div>
                <div style="font-weight:bold">Death Star 3.0</div>
                <div style="font-size:12px; color:var(--text-gray)">242 members, 112 online</div>
            </div>
            <div class="icon-btn" onclick="logout()">🚪</div>
        </div>
        <div class="messages" id="msg-box"></div>
        <div class="input-bar">
            <span class="icon-btn" onclick="document.getElementById('file-up').click()">📎</span>
            <input type="file" id="file-up" class="hidden" onchange="uploadFile()">
            <input type="text" id="m-inp" class="message-input" placeholder="Написать сообщение..." onkeypress="if(event.key=='Enter') sendText()">
            <span class="icon-btn" onclick="sendText()">➤</span>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'ВАШ_URL';
    const SB_KEY = 'ВАШ_КЛЮЧ';
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let user = null;
    let isReg = false;

    // --- Логика регистрации и входа ---
    function renderAuth() {
        const root = document.getElementById('auth-root');
        root.innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="auth-logo">
                    <h2>${isReg ? 'Создать аккаунт' : 'Вход в Telegram'}</h2>
                    <p style="color:red; font-size:12px" id="auth-err"></p>
                    ${isReg ? '<input type="text" id="nick" placeholder="Имя профиля">' : ''}
                    <input type="email" id="email" placeholder="Email">
                    <input type="password" id="pass" placeholder="Пароль">
                    <button class="auth-btn" onclick="authAction()">${isReg ? 'Зарегистрироваться' : 'Войти'}</button>
                    <span class="auth-switch" onclick="toggleMode()">${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация'}</span>
                </div>
            </div>
        `;
    }

    function toggleMode() {
        isReg = !isReg;
        renderAuth(); // Перерисовываем, чтобы кнопка и поля обновились
    }

    async function authAction() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const err = document.getElementById('auth-err');

        if (isReg) {
            const nick = document.getElementById('nick').value;
            const { data, error } = await supabase.auth.signUp({ email, password: pass });
            if (error) return err.innerText = error.message;
            await supabase.from('users').insert({ id: data.user.id, email, nickname: nick });
            alert("Успех! Теперь войдите.");
            toggleMode();
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) return err.innerText = error.message;
            checkSession();
        }
    }

    // --- Основное приложение ---
    async function checkSession() {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
            user = data.session.user;
            document.getElementById('auth-root').classList.add('hidden');
            document.getElementById('app-root').classList.remove('hidden');
            loadMessages();
            subscribe();
        } else {
            renderAuth();
        }
    }

    async function loadMessages() {
        const { data } = await supabase.from('messages').select('*, users(nickname)').order('created_at', { ascending: true });
        const box = document.getElementById('msg-box');
        box.innerHTML = data.map(m => {
            const isMe = m.user_id === user.id;
            return `
                <div class="message ${isMe ? 'out' : 'in'}">
                    ${!isMe ? `<div class="sender-name">${m.users?.nickname || 'Anon'}</div>` : ''}
                    ${m.media_url ? `<img src="${m.media_url}" class="media-img">` : ''}
                    <div>${m.text || ''}</div>
                    <div class="msg-time">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                </div>
            `;
        }).join('');
        box.scrollTop = box.scrollHeight;
        if(data.length) document.getElementById('side-preview').innerText = data[data.length-1].text;
    }

    async function sendText() {
        const inp = document.getElementById('m-inp');
        if (!inp.value) return;
        await supabase.from('messages').insert({ text: inp.value, user_id: user.id });
        inp.value = '';
    }

    async function uploadFile() {
        const file = document.getElementById('file-up').files[0];
        if (!file) return;
        const name = `${Date.now()}_${file.name}`;
        await supabase.storage.from('media').upload(name, file);
        const { data } = supabase.storage.from('media').getPublicUrl(name);
        await supabase.from('messages').insert({ media_url: data.publicUrl, user_id: user.id });
    }

    function subscribe() {
        supabase.channel('custom-all-channel').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
            loadMessages();
        }).subscribe();
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }

    checkSession();
</script>
</body>
</html>
