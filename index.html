<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: none;
            height: 100vh;
            background: #f0f2f5;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .profile-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            background: #667eea;
        }

        .user-info {
            flex: 1;
        }

        .user-nickname {
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #4caf50;
        }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #e8eaf6;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #667eea;
        }

        .chat-details {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-last-message {
            font-size: 12px;
            color: #666;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-actions button {
            padding: 8px 12px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
        }

        .message-sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
        }

        .message-received {
            background: white;
            color: #333;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-content {
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }

        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .file-button {
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-box h2 {
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            color: #667eea;
            cursor: pointer;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }

        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2>Мессенджер</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <div id="loginError" class="error-message"></div>
                <button id="loginBtn">Войти</button>
                <div class="auth-switch" id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</div>
            </div>
            <div id="registerForm" style="display:none">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <input type="password" id="regPassword" placeholder="Пароль">
                <div id="regError" class="error-message"></div>
                <div id="regSuccess" class="success-message"></div>
                <button id="registerBtn">Зарегистрироваться</button>
                <div class="auth-switch" id="showLoginBtn">Уже есть аккаунт? Войти</div>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container" style="display:none">
        <div class="sidebar">
            <div class="profile-header">
                <img id="userAvatar" class="avatar">
                <div class="user-info">
                    <div class="user-nickname" id="userNickname"></div>
                    <div class="user-status" id="userStatus">online</div>
                </div>
                <button id="logoutBtn" style="padding:6px 12px;background:#f44336;color:white;border:none;border-radius:6px;cursor:pointer">Выйти</button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск..." id="searchInput">
            </div>
            <div class="tabs">
                <button class="tab active" id="chatsTab">Чаты</button>
                <button class="tab" id="friendsTab">Друзья</button>
            </div>
            <div id="chatsList" class="chats-list"></div>
            <div id="friendsList" class="chats-list" style="display:none"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="currentChatName">Выберите чат</div>
                <div class="chat-actions">
                    <button id="deleteChatBtn">Удалить чат</button>
                </div>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div class="input-area">
                <button class="file-button" id="fileBtn">📎</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
                <textarea id="messageInput" class="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="send-button" id="sendBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentChat = null;

        // Регистрация (без ручного создания профиля)
        async function register() {
            const email = document.getElementById('regEmail').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;

            document.getElementById('regError').textContent = '';
            document.getElementById('regSuccess').textContent = '';

            if (!email || !nickname || !password) {
                document.getElementById('regError').textContent = 'Заполните все поля';
                return;
            }

            if (password.length < 6) {
                document.getElementById('regError').textContent = 'Пароль должен быть не менее 6 символов';
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            try {
                // Только регистрация в Auth - профиль создаст триггер
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { nickname: nickname }
                    }
                });

                if (error) {
                    if (error.message.includes('already registered')) {
                        document.getElementById('regError').textContent = 'Email уже зарегистрирован';
                    } else {
                        document.getElementById('regError').textContent = error.message;
                    }
                    return;
                }

                if (data.user) {
                    document.getElementById('regSuccess').textContent = 'Регистрация успешна! Теперь войдите.';

                    // Очищаем форму
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regNickname').value = '';
                    document.getElementById('regPassword').value = '';

                    // Переключаемся на вход
                    setTimeout(() => {
                        showLogin();
                    }, 2000);
                }
            } catch (err) {
                document.getElementById('regError').textContent = 'Ошибка: ' + err.message;
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        }

        // Вход
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginError').textContent = '';

            if (!email || !password) {
                document.getElementById('loginError').textContent = 'Заполните все поля';
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    document.getElementById('loginError').textContent = 'Неверный email или пароль';
                    return;
                }

                currentUser = data.user;

                // Получаем профиль
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (userError) {
                    console.error('Profile error:', userError);
                    document.getElementById('loginError').textContent = 'Профиль не найден';
                    return;
                }

                currentUser.profile = userData;

                // Показываем интерфейс
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                document.getElementById('userNickname').textContent = userData.nickname;
                document.getElementById('userAvatar').src = userData.avatar_url || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(userData.nickname)}`;

                loadChats();

            } catch (err) {
                document.getElementById('loginError').textContent = 'Ошибка входа';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            }
        }

        function logout() {
            supabase.auth.signOut();
            currentUser = null;
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }

        async function loadChats() {
            // Заглушка
            document.getElementById('chatsList').innerHTML = '<div style="padding:20px;text-align:center;color:#999;">Чаты появятся здесь</div>';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        // Обработчики
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('showRegisterBtn').onclick = showRegister;
        document.getElementById('showLoginBtn').onclick = showLogin;
        document.getElementById('logoutBtn').onclick = logout;

        // Проверка сессии
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                login();
            }
        });
    </script>
</body>
</html>
