<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Messenger</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --msg-own: #6366f1;
            --msg-their: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #0f172a;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- Auth --- */
        .auth-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; padding: 20px;
            background: radial-gradient(circle at top left, #4f46e5, #0f172a);
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        input, textarea {
            width: 100%; padding: 14px; margin: 8px 0;
            border: 1px solid #e2e8f0; border-radius: 12px;
            font-size: 16px; transition: 0.3s;
        }

        .btn {
            cursor: pointer; transition: 0.3s; font-weight: 600;
            border: none; border-radius: 12px; display: inline-flex;
            align-items: center; justify-content: center; gap: 8px;
        }

        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

        /* --- App Layout --- */
        .app-container {
            display: none; height: 100vh; background: var(--bg-main);
            position: relative; overflow: hidden;
        }

        .sidebar {
            width: 380px; background: var(--bg-sidebar);
            border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column;
            transition: 0.3s ease; z-index: 10;
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; }
            .chat-area { position: absolute; left: 100%; width: 100%; height: 100%; transition: 0.3s ease; z-index: 20; }
            .app-container.chat-open .chat-area { left: 0; }
        }

        /* --- Components --- */
        .header-ui { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .profile-trigger { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; border-radius: 14px; object-fit: cover; background: #ddd; }

        .tabs { display: flex; padding: 5px 15px; gap: 10px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #eef2ff; color: var(--primary); }

        .chats-scroll { flex: 1; overflow-y: auto; }
        .chat-card { padding: 14px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .chat-card:hover { background: #f8fafc; }
        .chat-card.active { background: #f1f5f9; }

        .messages-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f1f5f9; }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .msg-own { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg-their { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }

        .input-bar { padding: 15px 20px; background: white; display: flex; gap: 12px; align-items: center; border-top: 1px solid #e2e8f0; }
        .msg-input { flex: 1; background: #f1f5f9; border: none; padding: 12px 20px; border-radius: 25px; }

        /* --- Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        .modal-body { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; }

        .fab { position: absolute; right: 20px; bottom: 20px; width: 56px; height: 56px; background: var(--primary); border-radius: 18px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 10px 15px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 style="text-align:center; margin-bottom:20px">Nexus Chat</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="btn btn-primary" onclick="login()">Войти</button>
                <p onclick="toggleAuth(true)" style="text-align:center; margin-top:15px; cursor:pointer; font-size:14px; color:var(--text-muted)">Создать аккаунт</p>
            </div>
            <div id="registerForm" style="display:none">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль">
                <button class="btn btn-primary" onclick="register()">Зарегистрироваться</button>
                <p onclick="toggleAuth(false)" style="text-align:center; margin-top:15px; cursor:pointer; font-size:14px; color:var(--text-muted)">Уже есть аккаунт?</p>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar">
            <div class="header-ui">
                <div class="profile-trigger" onclick="openSettings()">
                    <img id="myAvatar" class="avatar" src="">
                    <div id="myName" style="font-weight:700">Загрузка...</div>
                </div>
                <button onclick="logout()" style="background:none; border:none; cursor:pointer">🚪</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tabChats" onclick="switchTab('chats')">Чаты</button>
                <button class="tab-btn" id="tabFriends" onclick="switchTab('friends')">Друзья</button>
            </div>
            <div class="chats-scroll" id="mainList"></div>
            <div class="fab" onclick="openGroupModal()">＋</div>
        </div>

        <div class="chat-area">
            <div class="chat-header" style="padding:15px; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; gap:10px; background:white">
                <button onclick="closeChat()" style="border:none; background:none; font-size:20px; padding:5px" class="back-btn">‹</button>
                <img id="activeChatAvatar" class="avatar" style="width:36px; height:36px" src="">
                <div id="activeChatName" style="font-weight:700; flex:1">Выберите чат</div>
                <button id="delBtn" onclick="deleteChat()" style="display:none; border:none; background:none; color:red">🗑️</button>
            </div>
            <div class="messages-box" id="msgBox"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" class="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn btn-primary" style="width:auto; padding:10px 20px" onclick="send()">➔</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-body">
            <h3>Профиль</h3>
            <input type="text" id="setNickname" placeholder="Никнейм">
            <button class="btn btn-primary" onclick="saveProfile()">Сохранить</button>
        </div>
    </div>

    <div id="groupModal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-body">
            <h3>Новая группа</h3>
            <input type="text" id="groupName" placeholder="Название">
            <textarea id="groupMembers" placeholder="Ники через запятую"></textarea>
            <button class="btn btn-primary" onclick="createGroup()">Создать</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Объявляем ОДИН раз
        const S_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';
        const sb = window.supabase.createClient(S_URL, S_KEY);

        let me = null;
        let activeId = null;
        let tab = 'chats';
        let sub = null;

        function toggleAuth(reg) {
            document.getElementById('loginForm').style.display = reg ? 'none' : 'block';
            document.getElementById('registerForm').style.display = reg ? 'block' : 'none';
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            const nick = document.getElementById('regNickname').value;
            const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { nickname: nick } } });
            if(error) alert(error.message); else alert('Успех! Войдите.');
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if(error) alert(error.message); else init(data.user);
        }

        async function init(user) {
            me = user;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            const { data } = await sb.from('users').select('*').eq('id', me.id).single();
            me.profile = data;
            document.getElementById('myName').textContent = data.nickname;
            document.getElementById('myAvatar').src = data.avatar_url || `https://ui-avatars.com/api/?name=${data.nickname}`;
            loadList();
        }

        async function loadList() {
            const list = document.getElementById('mainList');
            list.innerHTML = '';
            if(tab === 'chats') {
                const { data: members } = await sb.from('chat_members').select('chat_id').eq('user_id', me.id);
                const ids = members.map(m => m.chat_id);
                const { data: chats } = await sb.from('chats').select('*').in('id', ids);
                chats.forEach(c => {
                    const d = document.createElement('div');
                    d.className = `chat-card ${activeId === c.id ? 'active' : ''}`;
                    d.innerHTML = `<img class="avatar" src="https://ui-avatars.com/api/?name=${c.name}"><div class="chat-info"><b>${c.name || 'Чат'}</b></div>`;
                    d.onclick = () => selectChat(c);
                    list.appendChild(d);
                });
            } else {
                const { data: users } = await sb.from('users').select('*').neq('id', me.id).limit(20);
                users.forEach(u => {
                    const d = document.createElement('div');
                    d.className = 'chat-card';
                    d.innerHTML = `<img class="avatar" src="${u.avatar_url || 'https://ui-avatars.com/api/?name='+u.nickname}"><div class="chat-info"><b>${u.nickname}</b></div>`;
                    d.onclick = () => startPrivate(u);
                    list.appendChild(d);
                });
            }
        }

        async function selectChat(chat) {
            activeId = chat.id;
            document.getElementById('appContainer').classList.add('chat-open');
            document.getElementById('activeChatName').textContent = chat.name;
            document.getElementById('activeChatAvatar').src = `https://ui-avatars.com/api/?name=${chat.name}`;
            document.getElementById('delBtn').style.display = 'block';
            loadMsgs();
            subscribe();
        }

        async function loadMsgs() {
            const { data } = await sb.from('messages').select('*').eq('chat_id', activeId).order('created_at');
            const box = document.getElementById('msgBox');
            box.innerHTML = '';
            data.forEach(m => addMsg(m));
        }

        function addMsg(m) {
            const box = document.getElementById('msgBox');
            const div = document.createElement('div');
            div.className = `msg ${m.user_id === me.id ? 'msg-own' : 'msg-their'}`;
            div.textContent = m.content;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msgInput');
            if(!i.value || !activeId) return;
            const content = i.value; i.value = '';
            await sb.from('messages').insert({ chat_id: activeId, user_id: me.id, content });
        }

        function subscribe() {
            if(sub) sub.unsubscribe();
            sub = sb.channel('any').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`chat_id=eq.${activeId}`}, p => addMsg(p.new)).subscribe();
        }

        async function startPrivate(u) {
            const { data: chat } = await sb.from('chats').insert({ name: u.nickname, type: 'private' }).select().single();
            await sb.from('chat_members').insert([{chat_id: chat.id, user_id: me.id}, {chat_id: chat.id, user_id: u.id}]);
            tab = 'chats'; loadList(); selectChat(chat);
        }

        async function createGroup() {
            const name = document.getElementById('groupName').value;
            const nicks = document.getElementById('groupMembers').value.split(',').map(n => n.trim());
            const { data: chat } = await sb.from('chats').insert({ name, type: 'group' }).select().single();
            await sb.from('chat_members').insert({ chat_id: chat.id, user_id: me.id, role: 'admin' });
            const { data: users } = await sb.from('users').select('id').in('nickname', nicks);
            if(users) await sb.from('chat_members').insert(users.map(u => ({chat_id: chat.id, user_id: u.id})));
            closeModals(); loadList();
        }

        async function deleteChat() {
            if(confirm('Удалить чат?')) {
                await sb.from('chats').delete().eq('id', activeId);
                activeId = null; closeChat(); loadList();
            }
        }

        function switchTab(t) { tab = t; document.getElementById('tabChats').classList.toggle('active', t==='chats'); document.getElementById('tabFriends').classList.toggle('active', t==='friends'); loadList(); }
        function openSettings() { document.getElementById('settingsModal').style.display='flex'; document.getElementById('setNickname').value = me.profile.nickname; }
        async function saveProfile() { const n = document.getElementById('setNickname').value; await sb.from('users').update({nickname:n}).eq('id', me.id); me.profile.nickname=n; document.getElementById('myName').textContent=n; closeModals(); }
        function closeChat() { document.getElementById('appContainer').classList.remove('chat-open'); }
        function openGroupModal() { document.getElementById('groupModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function logout() { sb.auth.signOut(); location.reload(); }

        // Auto-login
        sb.auth.getSession().then(({data}) => { if(data.session) init(data.session.user); });
    </script>
</body>
</html>
