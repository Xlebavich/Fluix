<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone - Полная версия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Темы */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1f1f1f;
            --bg-tertiary: #2c2c2c;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd1;
            --border: #2c2c2c;
            --message-sent: #6c5ce7;
            --message-received: #1f1f1f;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f0f0;
            --bg-tertiary: #e0e0e0;
            --text-primary: #000000;
            --text-secondary: #666666;
            --accent: #0088cc;
            --accent-hover: #0077b3;
            --border: #d0d0d0;
            --message-sent: #0088cc;
            --message-received: #e8e8e8;
        }

        [data-theme="blue"] {
            --bg-primary: #0a2a3a;
            --bg-secondary: #0d3b4f;
            --bg-tertiary: #114d66;
            --text-primary: #ffffff;
            --text-secondary: #a0c4d4;
            --accent: #4a90e2;
            --accent-hover: #3a7bc8;
            --border: #1a5a75;
            --message-sent: #4a90e2;
            --message-received: #0d3b4f;
        }

        [data-theme="green"] {
            --bg-primary: #0a2a1a;
            --bg-secondary: #0d3b25;
            --bg-tertiary: #114d30;
            --text-primary: #ffffff;
            --text-secondary: #a0d4b4;
            --accent: #2ecc71;
            --accent-hover: #27ae60;
            --border: #1a5a35;
            --message-sent: #2ecc71;
            --message-received: #0d3b25;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 350px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 15px 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .user-info:hover {
            background: var(--bg-tertiary);
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #a363d9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            object-fit: cover;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 16px;
        }

        .user-status {
            color: var(--accent);
            font-size: 13px;
        }

        .search-box {
            margin-top: 15px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            flex: 1;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        /* Кнопка создания группы */
        .create-group-btn {
            margin-top: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .create-group-btn:hover {
            background: var(--accent-hover);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
        }

        .chat-item.active {
            background: var(--bg-tertiary);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--bg-tertiary);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-preview {
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            background: var(--bg-secondary);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: var(--bg-tertiary);
        }

        .chat-header-info h3 {
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            color: var(--accent);
            font-size: 13px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: var(--message-sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .input-area {
            background: var(--bg-secondary);
            padding: 15px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-button {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 18px;
            color: white;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .theme-option {
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 10px;
            text-align: center;
        }

        .theme-option:hover {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Контент будет загружен через JS -->
    </div>

    <script>
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';

        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Текущий пользователь
        let currentUser = null;
        let currentChat = 'general';
        let messages = [];
        let groups = [{ id: 'general', name: 'Общий чат', avatar: '💬', members: [] }];

        // Регистрация/логин
        async function showLogin() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>📱 Вход в Telegram</h2>
                    <input type="text" id="loginUsername" placeholder="Имя пользователя">
                    <button onclick="login()">Войти</button>
                    <button onclick="showRegister()" style="margin-top: 10px; background: var(--bg-tertiary); color: var(--text-primary);">Регистрация</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        window.login = async function() {
            const username = document.getElementById('loginUsername').value.trim();
            if (!username) return alert('Введите имя');

            // Проверяем существует ли пользователь
            const { data } = await _supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .single();

            if (data) {
                currentUser = data;
            } else {
                return alert('Пользователь не найден. Зарегистрируйтесь');
            }

            localStorage.setItem('telegram_user', JSON.stringify(currentUser));
            document.querySelector('.modal').remove();
            initApp();
        };

        window.showRegister = async function() {
            const modal = document.querySelector('.modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>📝 Регистрация</h2>
                    <input type="text" id="regUsername" placeholder="Имя пользователя">
                    <input type="text" id="regFullname" placeholder="Полное имя">
                    <input type="file" id="regAvatar" accept="image/*">
                    <button onclick="register()">Зарегистрироваться</button>
                    <button onclick="showLogin()" style="margin-top: 10px; background: var(--bg-tertiary);">Назад</button>
                </div>
            `;
        };

        window.register = async function() {
            const username = document.getElementById('regUsername').value.trim();
            const fullname = document.getElementById('regFullname').value.trim();
            const avatarFile = document.getElementById('regAvatar').files[0];

            if (!username || !fullname) return alert('Заполните все поля');

            // Проверяем уникальность
            const { data: existing } = await _supabase
                .from('users')
                .select('username')
                .eq('username', username)
                .single();

            if (existing) return alert('Имя уже занято');

            let avatarUrl = null;
            if (avatarFile) {
                const fileName = `${username}_${Date.now()}`;
                const { data: uploadData } = await _supabase.storage
                    .from('avatars')
                    .upload(fileName, avatarFile);
                if (uploadData) {
                    const { data: urlData } = _supabase.storage
                        .from('avatars')
                        .getPublicUrl(fileName);
                    avatarUrl = urlData.publicUrl;
                }
            }

            const newUser = {
                username,
                fullname,
                avatar: avatarUrl,
                created_at: new Date()
            };

            const { data } = await _supabase.from('users').insert(newUser).select().single();
            currentUser = data;
            localStorage.setItem('telegram_user', JSON.stringify(currentUser));
            document.querySelector('.modal').remove();
            initApp();
        };

        // Инициализация приложения
        async function initApp() {
            await loadGroups();
            await loadMessages();
            renderUI();
            setupRealtime();
        }

        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            if (data) groups = data;
            if (!groups.find(g => g.id === 'general')) {
                groups.unshift({ id: 'general', name: 'Общий чат', avatar: '💬', members: [] });
            }
        }

        async function loadMessages() {
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .eq('chat_id', currentChat)
                .order('created_at', { ascending: true });

            if (!error && data) messages = data;
            renderMessages();
        }

        function renderUI() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', theme);

            document.getElementById('app').innerHTML = `
                <div class="sidebar">
                    <div class="sidebar-header">
                        <h1>Telegram</h1>
                        <div class="user-info" onclick="showProfile()">
                            ${currentUser.avatar ? `<img class="avatar-img" src="${currentUser.avatar}" style="width:48px;height:48px;border-radius:50%;">` : `<div class="avatar">${currentUser.fullname ? currentUser.fullname[0] : '👤'}</div>`}
                            <div class="user-details">
                                <div class="user-name">${currentUser.fullname || currentUser.username}</div>
                                <div class="user-status">${currentUser.username}</div>
                            </div>
                        </div>
                        <div class="search-box">
                            <span>🔍</span>
                            <input type="text" placeholder="Поиск" id="searchInput">
                        </div>
                        <button class="create-group-btn" onclick="showCreateGroup()">➕ Создать группу</button>
                    </div>
                    <div class="chats-list" id="chatsList">
                        ${groups.map(group => `
                            <div class="chat-item ${currentChat === group.id ? 'active' : ''}" onclick="switchChat('${group.id}')">
                                <div class="chat-avatar">${group.avatar || '💬'}</div>
                                <div class="chat-info">
                                    <div class="chat-name">${group.name}</div>
                                    <div class="chat-preview" id="preview_${group.id}">${getLastMessage(group.id)}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-header-avatar">${groups.find(g => g.id === currentChat)?.avatar || '💬'}</div>
                        <div class="chat-header-info">
                            <h3>${groups.find(g => g.id === currentChat)?.name || 'Чат'}</h3>
                            <p>участников: ${groups.find(g => g.id === currentChat)?.members?.length || '∞'}</p>
                        </div>
                        <button onclick="showThemeMenu()" style="margin-left:auto;background:none;border:none;font-size:24px;cursor:pointer;">🎨</button>
                    </div>
                    <div class="messages-area" id="messagesArea">
                        <div style="text-align: center; padding: 20px;">Загрузка...</div>
                    </div>
                    <div class="input-area">
                        <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="send-button" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            `;
        }

        function getLastMessage(chatId) {
            const lastMsg = messages.filter(m => m.chat_id === chatId).pop();
            return lastMsg ? (lastMsg.content.substring(0, 30) + (lastMsg.content.length > 30 ? '...' : '')) : 'Нет сообщений';
        }

        function renderMessages() {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;

            const chatMessages = messages.filter(m => m.chat_id === currentChat);

            if (chatMessages.length === 0) {
                messagesArea.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-secondary);">💬 Нет сообщений. Напишите первое!</div>`;
                return;
            }

            messagesArea.innerHTML = chatMessages.map(msg => {
                const isSent = msg.user_id === currentUser.id;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">
                            ${!isSent ? `<div style="font-size: 12px; color: var(--accent); margin-bottom: 4px;">${msg.username}</div>` : ''}
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');

            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;

            await _supabase.from('messages').insert({
                content: content,
                username: currentUser.username,
                user_id: currentUser.id,
                chat_id: currentChat,
                created_at: new Date()
            });

            input.value = '';
        };

        window.switchChat = async function(chatId) {
            currentChat = chatId;
            await loadMessages();
            renderUI();
        };

        window.showProfile = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>👤 Мой профиль</h2>
                    ${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100px;height:100px;border-radius:50%;margin:0 auto 20px;display:block;">` : `<div class="avatar" style="width:100px;height:100px;margin:0 auto 20px;font-size:40px;">${currentUser.fullname ? currentUser.fullname[0] : '👤'}</div>`}
                    <p><strong>Имя:</strong> ${currentUser.fullname}</p>
                    <p><strong>Логин:</strong> @${currentUser.username}</p>
                    <p><strong>ID:</strong> ${currentUser.id}</p>
                    <button onclick="changeAvatar()" style="margin-top:10px;">🖼️ Сменить аватар</button>
                    <button onclick="closeModal()" style="margin-top:10px;background:var(--bg-tertiary);">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.changeAvatar = async function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const fileName = `${currentUser.username}_${Date.now()}`;
                    const { data } = await _supabase.storage.from('avatars').upload(fileName, file);
                    if (data) {
                        const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
                        await _supabase.from('users').update({ avatar: urlData.publicUrl }).eq('id', currentUser.id);
                        currentUser.avatar = urlData.publicUrl;
                        localStorage.setItem('telegram_user', JSON.stringify(currentUser));
                        alert('Аватар обновлен!');
                        closeModal();
                        renderUI();
                    }
                }
            };
            input.click();
        };

        window.showCreateGroup = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>➕ Создать группу</h2>
                    <input type="text" id="groupName" placeholder="Название группы">
                    <input type="text" id="groupAvatar" placeholder="Эмодзи аватара (например, 🎮)">
                    <button onclick="createGroup()">Создать</button>
                    <button onclick="closeModal()" style="margin-top:10px;background:var(--bg-tertiary);">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.createGroup = async function() {
            const name = document.getElementById('groupName').value.trim();
            const avatar = document.getElementById('groupAvatar').value || '👥';
            if (!name) return alert('Введите название');

            const newGroup = {
                id: Date.now().toString(),
                name: name,
                avatar: avatar,
                members: [currentUser.id],
                created_by: currentUser.id,
                created_at: new Date()
            };

            await _supabase.from('groups').insert(newGroup);
            await loadGroups();
            closeModal();
            renderUI();
        };

        window.showThemeMenu = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🎨 Выберите тему</h2>
                    <div class="theme-option" onclick="setTheme('dark')">🌙 Тёмная</div>
                    <div class="theme-option" onclick="setTheme('light')">☀️ Светлая</div>
                    <div class="theme-option" onclick="setTheme('blue')">💙 Синяя</div>
                    <div class="theme-option" onclick="setTheme('green')">💚 Зелёная</div>
                    <button onclick="closeModal()" style="margin-top:15px;">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.setTheme = function(theme) {
            localStorage.setItem('theme', theme);
            document.body.setAttribute('data-theme', theme);
            closeModal();
        };

        window.closeModal = function() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupRealtime() {
            _supabase
                .channel('messages-channel')
                .on('postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    (payload) => {
                        if (payload.new.chat_id === currentChat) {
                            messages.push(payload.new);
                            renderMessages();
                        }
                        renderUI(); // Обновляем превью
                    }
                )
                .subscribe();
        }

        // Запуск
        const savedUser = localStorage.getItem('telegram_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            initApp();
        } else {
            showLogin();
        }
    </script>
</body>
</html>
