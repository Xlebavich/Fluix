<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Messenger</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --msg-own: #6366f1;
            --msg-their: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background: #0f172a; height: 100vh; overflow: hidden; }

        /* Auth Section */
        #authSection {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background: radial-gradient(circle at top left, #4f46e5, #0f172a);
        }

        .auth-card {
            background: white; padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: var(--primary); color: white; font-weight: 600; cursor: pointer;
        }

        /* App Section */
        #appSection { display: none; height: 100vh; }

        .sidebar {
            width: 350px; background: white; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column;
        }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }

        .m-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; }
        .msg.own { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.their { align-self: flex-start; background: white; border-bottom-left-radius: 2px; }

        .input-area { padding: 20px; background: white; display: flex; gap: 10px; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            #appSection.chat-active .sidebar { display: none; }
            #appSection.chat-active .chat-main { display: flex; }
            .chat-main { display: none; width: 100%; }
        }

        .chat-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover { background: #f8fafc; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; background: #eee; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h2 id="authTitle" style="text-align:center; margin-bottom:20px">Вход</h2>
            <div id="loginInputs">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" onclick="handleLogin()">Войти</button>
                <p onclick="toggleA(true)" style="text-align:center; margin-top:15px; cursor:pointer; font-size:14px; color:var(--text-muted)">Создать аккаунт</p>
            </div>
            <div id="regInputs" style="display:none">
                <input type="text" id="nick" placeholder="Никнейм">
                <input type="email" id="remail" placeholder="Email">
                <input type="password" id="rpass" placeholder="Пароль">
                <button class="btn" onclick="handleReg()">Зарегистрироваться</button>
                <p onclick="toggleA(false)" style="text-align:center; margin-top:15px; cursor:pointer; font-size:14px; color:var(--text-muted)">Уже есть аккаунт?</p>
            </div>
        </div>
    </div>

    <div id="appSection">
        <div class="sidebar">
            <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
                <div style="display:flex; align-items:center; gap:10px">
                    <img id="myAv" class="avatar" src="">
                    <b id="myNi">Загрузка...</b>
                </div>
                <button onclick="handleLogout()" style="border:none; background:none; cursor:pointer">🚪</button>
            </div>
            <div id="chatList" style="flex:1; overflow-y:auto"></div>
            <button onclick="openGroup()" style="padding:15px; background:var(--primary); color:white; border:none; cursor:pointer">+ Группа / Друг</button>
        </div>

        <div class="chat-main">
            <div style="padding:15px; background:white; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px">
                <button onclick="goBack()" style="padding:5px 10px; border:none; background:#eee; border-radius:5px" id="backBtn">Назад</button>
                <b id="curChatName">Выберите чат</b>
            </div>
            <div class="m-box" id="msgBox"></div>
            <div class="input-area">
                <input type="text" id="mIn" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendM()">
                <button class="btn" style="width:auto; padding:0 20px" onclick="sendM()">➔</button>
            </div>
        </div>
    </div>

    <div id="gMod" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:100">
        <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:400px">
            <h3>Создать группу</h3>
            <input type="text" id="gName" placeholder="Название группы">
            <textarea id="gUsers" style="width:100%; margin:10px 0; padding:10px; border-radius:10px" placeholder="Ники через запятую"></textarea>
            <button class="btn" onclick="createG()">Создать</button>
            <button class="btn" style="background:#eee; color:black; margin-top:10px" onclick="this.parentElement.parentElement.style.display='none'">Отмена</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Используем уникальное имя для клиента, чтобы избежать "already declared"
        const NEXUS_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const NEXUS_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';
        const nexus = window.supabase.createClient(NEXUS_URL, NEXUS_KEY);

        let curUser = null;
        let curChat = null;
        let msgSub = null;

        // --- AUTH ---
        function toggleA(isR) {
            document.getElementById('loginInputs').style.display = isR ? 'none' : 'block';
            document.getElementById('regInputs').style.display = isR ? 'block' : 'none';
            document.getElementById('authTitle').innerText = isR ? 'Регистрация' : 'Вход';
        }

        async function handleReg() {
            const e = document.getElementById('remail').value;
            const p = document.getElementById('rpass').value;
            const n = document.getElementById('nick').value;
            const { error } = await nexus.auth.signUp({ email: e, password: p, options: { data: { nickname: n } } });
            if(error) alert(error.message); else alert('Готово! Войдите.');
        }

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const { data, error } = await nexus.auth.signInWithPassword({ email: e, password: p });
            if(error) alert(error.message); else startApp(data.user);
        }

        // --- APP ---
        async function startApp(user) {
            curUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'flex';

            const { data: prof } = await nexus.from('users').select('*').eq('id', user.id).single();
            document.getElementById('myNi').innerText = prof.nickname;
            document.getElementById('myAv').src = prof.avatar_url || `https://ui-avatars.com/api/?name=${prof.nickname}`;

            loadChats();
        }

        async function loadChats() {
            const { data: members } = await nexus.from('chat_members').select('chat_id').eq('user_id', curUser.id);
            const ids = members.map(m => m.chat_id);
            const { data: chats } = await nexus.from('chats').select('*').in('id', ids);

            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.innerHTML = `<img class="avatar" src="https://ui-avatars.com/api/?name=${c.name}"> <b>${c.name || 'Чат'}</b>`;
                item.onclick = () => openChat(c);
                list.appendChild(item);
            });
        }

        async function openChat(chat) {
            curChat = chat;
            document.getElementById('appSection').classList.add('chat-active');
            document.getElementById('curChatName').innerText = chat.name;

            loadMsgs();
            if(msgSub) msgSub.unsubscribe();
            msgSub = nexus.channel('msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages', filter:`chat_id=eq.${chat.id}`}, p => addM(p.new)).subscribe();
        }

        async function loadMsgs() {
            const { data } = await nexus.from('messages').select('*').eq('chat_id', curChat.id).order('created_at');
            document.getElementById('msgBox').innerHTML = '';
            data.forEach(m => addM(m));
        }

        function addM(m) {
            const box = document.getElementById('msgBox');
            const div = document.createElement('div');
            div.className = `msg ${m.user_id === curUser.id ? 'own' : 'their'}`;
            div.innerText = m.content;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendM() {
            const i = document.getElementById('mIn');
            if(!i.value || !curChat) return;
            const txt = i.value; i.value = '';
            await nexus.from('messages').insert({ chat_id: curChat.id, user_id: curUser.id, content: txt });
        }

        // --- GROUPS ---
        function openGroup() { document.getElementById('gMod').style.display = 'flex'; }
        async function createG() {
            const name = document.getElementById('gName').value;
            const nicks = document.getElementById('gUsers').value.split(',').map(n => n.trim());
            const { data: chat } = await nexus.from('chats').insert({ name, type: 'group' }).select().single();
            await nexus.from('chat_members').insert({ chat_id: chat.id, user_id: curUser.id, role: 'admin' });

            const { data: users } = await nexus.from('users').select('id').in('nickname', nicks);
            if(users) {
                const ins = users.map(u => ({ chat_id: chat.id, user_id: u.id }));
                await nexus.from('chat_members').insert(ins);
            }
            document.getElementById('gMod').style.display = 'none';
            loadChats();
        }

        function goBack() { document.getElementById('appSection').classList.remove('chat-active'); }
        function handleLogout() { nexus.auth.signOut(); location.reload(); }

        // Прямой вход если есть сессия
        nexus.auth.getSession().then(({data}) => { if(data.session) startApp(data.session.user); });
    </script>
</body>
</html>
