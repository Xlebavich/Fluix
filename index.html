<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* Страница входа/регистрации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-box h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .auth-box button:hover {
            background: #5a67d8;
        }

        .switch-btn {
            background: #e0e0e0 !important;
            color: #333 !important;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Основное приложение */
        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: #1f1f1f;
            border-right: 1px solid #2c2c2c;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2c2c2c;
        }

        .sidebar-header h1 {
            color: white;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
        }

        .user-info:hover {
            background: #2c2c2c;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .user-name {
            color: white;
            font-weight: 500;
        }

        .user-email {
            color: #888;
            font-size: 12px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #2c2c2c;
        }

        .chat-item.active {
            background: #2c2c2c;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            background: #2c2c2c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-name {
            color: white;
            font-weight: 500;
        }

        .chat-preview {
            color: #888;
            font-size: 12px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        .chat-header {
            background: #1f1f1f;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2c2c2c;
        }

        .chat-header h3 {
            color: white;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
        }

        .message.sent .message-bubble {
            background: #667eea;
            color: white;
        }

        .message.received .message-bubble {
            background: #1f1f1f;
            color: white;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .input-area {
            background: #1f1f1f;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2c2c2c;
        }

        .message-input {
            flex: 1;
            background: #2c2c2c;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        .send-button {
            background: #667eea;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Данные Supabase
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentChat = 'general';
        let messages = [];

        // Функция отображения страницы входа
        function showAuth() {
            document.getElementById('app').innerHTML = `
                <div class="auth-container">
                    <div class="auth-box">
                        <h2 id="authTitle">📱 Вход</h2>
                        <div id="authError" class="error"></div>
                        <input type="email" id="email" placeholder="Email">
                        <input type="text" id="nickname" placeholder="Никнейм">
                        <button id="actionBtn">Войти</button>
                        <button id="switchBtn" class="switch-btn">Нет аккаунта? Регистрация</button>
                    </div>
                </div>
            `;

            let isLogin = true;

            const title = document.getElementById('authTitle');
            const actionBtn = document.getElementById('actionBtn');
            const switchBtn = document.getElementById('switchBtn');
            const emailInput = document.getElementById('email');
            const nicknameInput = document.getElementById('nickname');
            const errorDiv = document.getElementById('authError');

            // При входе ник не обязателен
            nicknameInput.placeholder = 'Никнейм (только при регистрации)';

            actionBtn.onclick = async () => {
                const email = emailInput.value.trim();
                const nickname = nicknameInput.value.trim();

                if (!email) {
                    errorDiv.innerText = 'Введите email';
                    return;
                }

                if (isLogin) {
                    // Вход
                    const { data, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('email', email)
                        .single();

                    if (error || !data) {
                        errorDiv.innerText = 'Пользователь не найден';
                    } else {
                        currentUser = data;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        initApp();
                    }
                } else {
                    // Регистрация
                    if (!nickname) {
                        errorDiv.innerText = 'Введите никнейм';
                        return;
                    }

                    // Проверяем уникальность
                    const { data: existing } = await supabase
                        .from('users')
                        .select('email')
                        .eq('email', email)
                        .single();

                    if (existing) {
                        errorDiv.innerText = 'Email уже зарегистрирован';
                        return;
                    }

                    const { data, error } = await supabase
                        .from('users')
                        .insert({
                            email: email,
                            nickname: nickname,
                            created_at: new Date()
                        })
                        .select()
                        .single();

                    if (error) {
                        errorDiv.innerText = 'Ошибка: ' + error.message;
                    } else {
                        currentUser = data;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        initApp();
                    }
                }
            };

            switchBtn.onclick = () => {
                isLogin = !isLogin;
                if (isLogin) {
                    title.innerText = '📱 Вход';
                    actionBtn.innerText = 'Войти';
                    switchBtn.innerText = 'Нет аккаунта? Регистрация';
                    nicknameInput.placeholder = 'Никнейм (только при регистрации)';
                    nicknameInput.value = '';
                } else {
                    title.innerText = '📝 Регистрация';
                    actionBtn.innerText = 'Зарегистрироваться';
                    switchBtn.innerText = 'Уже есть аккаунт? Вход';
                    nicknameInput.placeholder = 'Никнейм';
                }
                errorDiv.innerText = '';
            };
        }

        // Инициализация основного приложения
        async function initApp() {
            // Создаем таблицы если их нет
            await createTablesIfNotExist();
            await loadMessages();
            renderMainApp();
            setupRealtime();
        }

        async function createTablesIfNotExist() {
            // Пытаемся создать таблицу users если её нет
            try {
                await supabase.from('users').select('id').limit(1);
            } catch(e) {
                // Таблицы нет, но Supabase создаст через SQL вручную
                console.log('Убедитесь что таблицы созданы в Supabase SQL Editor');
            }
        }

        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('chat_id', currentChat)
                .order('created_at', { ascending: true });

            if (!error && data) {
                messages = data;
            } else {
                messages = [];
            }
        }

        function renderMainApp() {
            const groups = [
                { id: 'general', name: 'Общий чат', avatar: '💬' }
            ];

            document.getElementById('app').innerHTML = `
                <div class="app">
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <h1>Telegram</h1>
                            <div class="user-info" onclick="showProfile()">
                                <div class="avatar">${currentUser.nickname ? currentUser.nickname[0].toUpperCase() : 'U'}</div>
                                <div>
                                    <div class="user-name">${currentUser.nickname || 'Пользователь'}</div>
                                    <div class="user-email">${currentUser.email}</div>
                                </div>
                            </div>
                        </div>
                        <div class="chats-list">
                            ${groups.map(group => `
                                <div class="chat-item ${currentChat === group.id ? 'active' : ''}" onclick="switchChat('${group.id}')">
                                    <div class="chat-avatar">${group.avatar}</div>
                                    <div>
                                        <div class="chat-name">${group.name}</div>
                                        <div class="chat-preview">${getLastMessagePreview(group.id)}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="chat-area">
                        <div class="chat-header">
                            <div class="chat-avatar">💬</div>
                            <h3>Общий чат</h3>
                        </div>
                        <div class="messages-area" id="messagesArea">
                            ${renderMessagesHTML()}
                        </div>
                        <div class="input-area">
                            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                            <button class="send-button" onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                </div>
            `;

            const messagesArea = document.getElementById('messagesArea');
            if (messagesArea) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }

        function getLastMessagePreview(chatId) {
            const lastMsg = messages.filter(m => m.chat_id === chatId).pop();
            if (lastMsg) {
                return lastMsg.content.length > 30 ? lastMsg.content.substring(0, 30) + '...' : lastMsg.content;
            }
            return 'Нет сообщений';
        }

        function renderMessagesHTML() {
            const chatMessages = messages.filter(m => m.chat_id === currentChat);

            if (chatMessages.length === 0) {
                return '<div style="text-align: center; color: #888; padding: 40px;">💬 Нет сообщений. Напишите первое!</div>';
            }

            return chatMessages.map(msg => {
                const isSent = msg.user_id === currentUser.id;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">
                            ${!isSent ? `<div style="font-size: 11px; margin-bottom: 4px; opacity: 0.8;">${msg.nickname || msg.username}</div>` : ''}
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            const { error } = await supabase.from('messages').insert({
                content: content,
                username: currentUser.nickname,
                nickname: currentUser.nickname,
                user_id: currentUser.id,
                email: currentUser.email,
                chat_id: currentChat,
                created_at: new Date()
            });

            if (!error) {
                input.value = '';
                await loadMessages();
                renderMainApp();
            } else {
                alert('Ошибка: ' + error.message);
            }
        };

        window.switchChat = async function(chatId) {
            currentChat = chatId;
            await loadMessages();
            renderMainApp();
        };

        window.showProfile = function() {
            alert(`👤 Профиль\n\nEmail: ${currentUser.email}\nНикнейм: ${currentUser.nickname}\nID: ${currentUser.id}`);
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupRealtime() {
            supabase
                .channel('messages-channel')
                .on('postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    async () => {
                        await loadMessages();
                        renderMainApp();
                    }
                )
                .subscribe();
        }

        // Запуск приложения
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            initApp();
        } else {
            showAuth();
        }
    </script>
</body>
</html>
