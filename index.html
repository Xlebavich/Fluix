<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Telegram Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0e1621;
  color: white;
}

.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 320px;
  background: #17212b;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 10px;
  background: #242f3d;
}

.search {
  width: 100%;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 10px;
  cursor: pointer;
}

.chat-item:hover {
  background: #2b3a4a;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 10px;
  background: #17212b;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  background: #2b5278;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  max-width: 60%;
}

.input {
  display: flex;
  padding: 10px;
  background: #17212b;
}

input {
  border: none;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
}

button {
  margin-left: 5px;
  padding: 10px;
  background: #5288c1;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="topbar">
      <input class="search" placeholder="Поиск пользователей" oninput="searchUsers(this.value)">
      <button onclick="register()">Рег</button>
      <button onclick="login()">Вход</button>
    </div>

    <div id="chatList" class="chat-list"></div>
  </div>

  <div class="chat">
    <div id="chatHeader" class="header">Выбери чат</div>
    <div id="messages" class="messages"></div>

    <div class="input">
      <input id="messageInput" placeholder="Сообщение">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://xxqvsnxcudrwoyofjnie.supabase.co";
const SUPABASE_KEY = "ТВОЙ_АНОН_КЛЮЧ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentChat = null;

// ===== AUTH =====
async function register() {
  const email = prompt("Email");
  const password = prompt("Password");
  const username = prompt("Username");

  const { data, error } = await supabase.auth.signUp({ email, password });

  if (error) return alert(error.message);

  await supabase.from("profiles").insert([
    { id: data.user.id, username }
  ]);

  alert("Готово");
}

async function login() {
  const email = prompt("Email");
  const password = prompt("Password");

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) return alert(error.message);

  loadChats();
}

// ===== USERS SEARCH =====
async function searchUsers(query) {
  if (!query) return loadChats();

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .ilike("username", `%${query}%`);

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  data.forEach(user => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = user.username;

    div.onclick = () => sendFriendRequest(user.id);

    list.appendChild(div);
  });
}

// ===== FRIENDS =====
async function sendFriendRequest(userId) {
  const user = (await supabase.auth.getUser()).data.user;

  await supabase.from("friend_requests").insert([
    { sender: user.id, receiver: userId }
  ]);

  alert("Заявка отправлена");
}

// ===== CHATS =====
async function loadChats() {
  const user = (await supabase.auth.getUser()).data.user;

  const { data } = await supabase
    .from("chat_members")
    .select("chat_id, chats(*)")
    .eq("user_id", user.id);

  const list = document.getElementById("chatList");
  list.innerHTML = "";

  data.forEach(c => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.innerText = c.chats.name || "ЛС";
    div.onclick = () => openChat(c.chat_id);
    list.appendChild(div);
  });
}

// ===== MESSAGES =====
async function openChat(chatId) {
  currentChat = chatId;

  const { data } = await supabase
    .from("messages")
    .select("*")
    .eq("chat_id", chatId)
    .order("created_at");

  const messages = document.getElementById("messages");
  messages.innerHTML = "";

  data.forEach(addMessage);
}

function addMessage(msg) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = msg.content;
  document.getElementById("messages").appendChild(div);
}

async function sendMessage() {
  if (!currentChat) return;

  const user = (await supabase.auth.getUser()).data.user;
  const content = document.getElementById("messageInput").value;

  await supabase.from("messages").insert([
    { chat_id: currentChat, user_id: user.id, content }
  ]);

  document.getElementById("messageInput").value = "";
}

// ===== REALTIME =====
supabase
  .channel('messages')
  .on('postgres_changes', {
    event: 'INSERT',
    schema: 'public',
    table: 'messages'
  }, payload => {
    if (payload.new.chat_id === currentChat) {
      addMessage(payload.new);
    }
  })
  .subscribe();

</script>

</body>
</html>
