<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TG Super Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --active: #2481cc; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .user-card { padding: 15px; border-bottom: 1px solid #0e1621; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; }

        /* Chat */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 15px; background: var(--side); font-weight: bold; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Bubbles */
        .msg { max-width: 70%; padding: 10px; border-radius: 12px; position: relative; font-size: 14px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #2b5278; }
        .received { align-self: flex-start; background: #182533; }
        .media-content { max-width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Input */
        .input-area { padding: 15px; background: var(--side); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #242f3d; color: #fff; outline: none; }
        .btn { cursor: pointer; padding: 8px 15px; border-radius: 20px; background: var(--active); border: none; color: #fff; }

        /* Auth */
        .modal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: var(--side); padding: 30px; border-radius: 15px; width: 300px; text-align: center; }

        /* Utils */
        .hidden { display: none !important; }
        .emoji-btn { font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" class="modal">
    <div class="auth-box">
        <h2 id="auth-title">Вход</h2>
        <input type="text" id="auth-nick" placeholder="Никнейм (для рег.)">
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button class="btn" onclick="handleAuth()">Продолжить</button>
        <p onclick="toggleAuth()" style="font-size: 12px; margin-top: 15px; cursor: pointer; color: var(--active)">Сменить вход/регистрация</p>
    </div>
</div>

<div class="sidebar">
    <div class="user-card" id="my-profile">
        <img src="" class="avatar" id="my-avatar">
        <div id="my-name">Загрузка...</div>
    </div>
    <div style="padding: 10px;">
        <button class="btn" style="width: 100%;" onclick="addFriend()">+ Добавить друга (по Email)</button>
    </div>
    <div id="chat-list" style="overflow-y: auto; flex: 1;">
        </div>
</div>

<div class="main">
    <div class="chat-header" id="chat-title">Общий чат</div>
    <div class="messages" id="msg-box"></div>
    <div class="input-area">
        <span class="emoji-btn" onclick="addEmoji('😊')">😊</span>
        <label class="emoji-btn">📎<input type="file" id="file-input" class="hidden" onchange="uploadFile()"></label>
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key=='Enter') sendText()">
        <button class="btn" onclick="sendText()">➤</button>
    </div>
</div>

<script>
    const SB_URL = 'ТВОЙ_URL';
    const SB_KEY = 'ТВОЙ_КЛЮЧ';
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let user = null;
    let isLoginMode = true;

    async function init() {
        const { data } = await supabase.auth.getSession();
        if (data.session) {
            user = data.session.user;
            document.getElementById('auth-screen').classList.add('hidden');
            loadProfile();
            loadMessages();
            subscribe();
        }
    }

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? 'Вход' : 'Регистрация';
        document.getElementById('auth-nick').classList.toggle('hidden', isLoginMode);
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const nick = document.getElementById('auth-nick').value;

        if (isLoginMode) {
            await supabase.auth.signInWithPassword({ email, password: pass });
        } else {
            const { data } = await supabase.auth.signUp({ email, password: pass });
            await supabase.from('users').insert({ id: data.user.id, email, nickname: nick });
        }
        location.reload();
    }

    async function loadProfile() {
        const { data } = await supabase.from('users').select('*').eq('id', user.id).single();
        document.getElementById('my-name').innerText = data.nickname;
        document.getElementById('my-avatar').src = data.avatar_url;
    }

    async function sendText() {
        const inp = document.getElementById('msg-input');
        if (!inp.value) return;
        await supabase.from('messages').insert({ text: inp.value, user_id: user.id });
        inp.value = '';
    }

    async function uploadFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;

        const fName = `${Date.now()}_${file.name}`;
        const { data, error } = await supabase.storage.from('media').upload(fName, file);

        if (data) {
            const { data: urlData } = supabase.storage.from('media').getPublicUrl(fName);
            const type = file.type.includes('video') ? 'video' : 'image';
            await supabase.from('messages').insert({
                media_url: urlData.publicUrl,
                media_type: type,
                user_id: user.id
            });
        }
    }

    async function loadMessages() {
        const { data } = await supabase.from('messages').select('*, users(nickname, avatar_url)').order('created_at', { ascending: true });
        const box = document.getElementById('msg-box');
        box.innerHTML = data.map(m => `
            <div class="msg ${m.user_id === user.id ? 'sent' : 'received'}">
                <div style="font-size: 11px; color: #4fa4ed; font-weight: bold;">${m.users?.nickname}</div>
                ${m.text ? `<div>${m.text}</div>` : ''}
                ${m.media_url ? (m.media_type === 'video' ?
                    `<video src="${m.media_url}" class="media-content" controls></video>` :
                    `<img src="${m.media_url}" class="media-content">`) : ''}
                <div style="font-size: 9px; opacity: 0.5; text-align: right;">${new Date(m.created_at).toLocaleTimeString()}</div>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    function addEmoji(emoji) { document.getElementById('msg-input').value += emoji; }

    function subscribe() {
        supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
            loadMessages();
        }).subscribe();
    }

    init();
</script>
</body>
</html>
