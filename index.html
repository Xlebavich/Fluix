<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100vh;
            background: #0a0a0a;
        }

        /* Боковая панель (список чатов) */
        .sidebar {
            width: 350px;
            background: #1f1f1f;
            border-right: 1px solid #2c2c2c;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка Telegram */
        .sidebar-header {
            background: #1f1f1f;
            padding: 20px 15px 15px 20px;
            border-bottom: 1px solid #2c2c2c;
        }

        .sidebar-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 8px 0;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 500;
            font-size: 16px;
        }

        .user-status {
            color: #6c5ce7;
            font-size: 13px;
        }

        /* Поиск */
        .search-box {
            margin-top: 15px;
            background: #2c2c2c;
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            flex: 1;
        }

        .search-box input::placeholder {
            color: #888;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #2c2c2c;
        }

        .chat-item.active {
            background: #2c2c2c;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #2c2c2c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chat-preview {
            color: #888;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        /* Шапка чата */
        .chat-header {
            background: #1f1f1f;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2c2c2c;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            background: #2c2c2c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-header-info h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .chat-header-info p {
            color: #6c5ce7;
            font-size: 13px;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Сообщение */
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #6c5ce7;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1f1f1f;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .message.sent .message-time {
            color: rgba(255,255,255,0.8);
        }

        .message.received .message-time {
            color: #888;
        }

        /* Поле ввода */
        .input-area {
            background: #1f1f1f;
            padding: 15px 25px;
            border-top: 1px solid #2c2c2c;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            color: #888;
            transition: color 0.2s;
        }

        .attach-button:hover {
            color: #6c5ce7;
        }

        .message-input {
            flex: 1;
            background: #2c2c2c;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #888;
        }

        .send-button {
            background: #6c5ce7;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 18px;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1f1f1f;
        }

        ::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 3px;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h1, .chat-info, .user-details, .search-box input {
                display: none;
            }
            .search-box {
                justify-content: center;
            }
            .chat-name {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Telegram</h1>
                <div class="user-info">
                    <div class="avatar" id="avatarBtn">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="currentUsername">Вы</div>
                        <div class="user-status">онлайн</div>
                    </div>
                </div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Поиск" id="searchInput">
                </div>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="chat-item active" data-chat="general">
                    <div class="chat-avatar">💬</div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                        <div class="chat-preview" id="chatPreview">Добро пожаловать!</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Основная область чата -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar">💬</div>
                <div class="chat-header-info">
                    <h3>Общий чат</h3>
                    <p>участников: ∞</p>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #888; padding: 20px;">Загрузка сообщений...</div>
            </div>
            <div class="input-area">
                <button class="attach-button" onclick="alert('Функция скоро появится!')">📎</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-button" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ SUPABASE
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('telegram_username') || 'User_' + Math.floor(Math.random() * 10000);
        let messages = [];

        // Установка имени пользователя
        document.getElementById('currentUsername').innerText = currentUser;

        // Редактирование имени по клику на аватар
        document.getElementById('avatarBtn').onclick = () => {
            const newName = prompt('Введите ваше имя:', currentUser);
            if (newName && newName.trim()) {
                currentUser = newName.trim();
                localStorage.setItem('telegram_username', currentUser);
                document.getElementById('currentUsername').innerText = currentUser;
            }
        };

        // Загрузка сообщений
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Ошибка:', error);
                return;
            }

            messages = data || [];
            renderMessages();
            updateChatPreview();
        }

        // Отображение сообщений (как в Telegram)
        function renderMessages() {
            const messagesArea = document.getElementById('messagesArea');

            if (!messages || messages.length === 0) {
                messagesArea.innerHTML = `
                    <div style="text-align: center; color: #888; padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 10px;">💬</div>
                        <div>Нет сообщений</div>
                        <div style="font-size: 13px; margin-top: 10px;">Напишите первое сообщение!</div>
                    </div>
                `;
                return;
            }

            messagesArea.innerHTML = messages.map(msg => {
                const isSent = msg.username === currentUser;
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">
                            ${!isSent ? `<div style="font-size: 12px; color: #6c5ce7; margin-bottom: 4px; font-weight: 500;">${escapeHtml(msg.username)}</div>` : ''}
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Скролл вниз
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Обновление превью последнего сообщения
        function updateChatPreview() {
            if (messages.length > 0) {
                const lastMsg = messages[messages.length - 1];
                const preview = lastMsg.content.length > 30 ? lastMsg.content.substring(0, 30) + '...' : lastMsg.content;
                document.getElementById('chatPreview').innerText = preview;
            }
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            const { error } = await supabase.from('messages').insert({
                content: content,
                username: currentUser,
                created_at: new Date()
            });

            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }

            input.value = '';
            input.focus();
        }

        // Защита от XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Поиск сообщений
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchText = e.target.value.toLowerCase();
            if (!searchText) {
                renderMessages();
                return;
            }

            const filtered = messages.filter(msg =>
                msg.content.toLowerCase().includes(searchText) ||
                msg.username.toLowerCase().includes(searchText)
            );

            const messagesArea = document.getElementById('messagesArea');
            if (filtered.length === 0) {
                messagesArea.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">Ничего не найдено</div>';
            } else {
                messagesArea.innerHTML = filtered.map(msg => {
                    const isSent = msg.username === currentUser;
                    const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div class="message-bubble">
                                ${!isSent ? `<div style="font-size: 12px; color: #6c5ce7; margin-bottom: 4px;">${escapeHtml(msg.username)}</div>` : ''}
                                <div class="message-text">${escapeHtml(msg.content)}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        });

        // Realtime подписка
        supabase
            .channel('telegram-channel')
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages' },
                (payload) => {
                    messages.push(payload.new);
                    renderMessages();
                    updateChatPreview();
                }
            )
            .subscribe();

        // Загрузка сообщений при старте
        loadMessages();

        // Фокус на поле ввода
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
