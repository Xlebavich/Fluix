<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger - Облачный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер приложения */
        .app-container {
            display: none;
            height: 100vh;
            background: #f0f2f5;
        }

        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка профиля */
        .profile-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
        }

        .user-info {
            flex: 1;
        }

        .user-nickname {
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            color: #4caf50;
        }

        /* Поиск и вкладки */
        .search-box {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #e8eaf6;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-details {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
        }

        .chat-last-message {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: #999;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-actions button {
            padding: 8px 12px;
            margin-left: 8px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            position: relative;
        }

        .message-sent {
            background: #667eea;
            color: white;
            align-self: flex-end;
        }

        .message-received {
            background: white;
            color: #333;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-content {
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Панель ввода */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }

        .send-button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        .file-button {
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 20px;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Форма авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .auth-box h2 {
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            color: #667eea;
            cursor: pointer;
        }

        /* Группы */
        .group-members {
            padding: 8px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Авторизация -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2>Мессенджер</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button onclick="login()">Войти</button>
                <div class="auth-switch" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
            </div>
            <div id="registerForm" style="display:none">
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="text" id="regNickname" placeholder="Никнейм" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button onclick="register()">Зарегистрироваться</button>
                <div class="auth-switch" onclick="showLogin()">Уже есть аккаунт? Войти</div>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="appContainer" class="app-container" style="display:none">
        <div class="sidebar">
            <div class="profile-header">
                <img id="userAvatar" class="avatar" src="https://via.placeholder.com/48" alt="Avatar" onclick="changeAvatar()">
                <div class="user-info">
                    <div class="user-nickname" id="userNickname"></div>
                    <div class="user-status" id="userStatus">online</div>
                </div>
                <button onclick="logout()" style="padding:6px 12px;background:#f44336;color:white;border:none;border-radius:6px;cursor:pointer">Выйти</button>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск..." id="searchInput" oninput="searchChats()">
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('chats')">Чаты</button>
                <button class="tab" onclick="switchTab('friends')">Друзья</button>
            </div>
            <div id="chatsList" class="chats-list"></div>
            <div id="friendsList" class="chats-list" style="display:none"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <div class="chat-title" id="currentChatName">Выберите чат</div>
                    <div id="groupControls" style="display:none">
                        <button onclick="addMemberToGroup()">Добавить участника</button>
                        <button onclick="editGroup()">Редактировать группу</button>
                    </div>
                </div>
                <div class="chat-actions">
                    <button onclick="deleteCurrentChat()">Удалить чат</button>
                </div>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div class="input-area">
                <button class="file-button" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="sendFile(this)">
                <textarea id="messageInput" class="message-input" placeholder="Введите сообщение..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
                <button class="send-button" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <h3>Сменить аватар</h3>
            <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)">
            <button onclick="closeAvatarModal()">Закрыть</button>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3 id="groupModalTitle">Создать группу</h3>
            <input type="text" id="groupName" placeholder="Название группы">
            <input type="text" id="groupMembers" placeholder="Никнеймы участников (через запятую)">
            <button onclick="createOrUpdateGroup()">Создать</button>
            <button onclick="closeGroupModal()">Отмена</button>
        </div>
    </div>

    <div id="addFriendModal" class="modal">
        <div class="modal-content">
            <h3>Добавить друга</h3>
            <input type="text" id="friendNickname" placeholder="Никнейм друга">
            <button onclick="addFriend()">Отправить заявку</button>
            <button onclick="closeFriendModal()">Отмена</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentChat = null;
        let currentTab = 'chats';
        let messagesSubscription = null;

        // Авторизация
        async function register() {
            const email = document.getElementById('regEmail').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;

            if (!email || !nickname || !password) {
                alert('Заполните все поля');
                return;
            }

            try {
                // Регистрация в Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) throw authError;

                // Создание профиля пользователя
                const { error: userError } = await supabase
                    .from('users')
                    .insert([{
                        id: authData.user.id,
                        email: email,
                        nickname: nickname,
                        avatar_url: `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(nickname)}`
                    }]);

                if (userError) throw userError;

                alert('Регистрация успешна! Теперь войдите.');
                showLogin();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Заполните все поля');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;

                // Получаем профиль пользователя
                const { data: userData, error: userError } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                if (userError) throw userError;

                currentUser.profile = userData;

                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                document.getElementById('userNickname').textContent = userData.nickname;
                document.getElementById('userAvatar').src = userData.avatar_url || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(userData.nickname)}`;

                loadChats();
                loadFriends();
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        }

        function logout() {
            supabase.auth.signOut();
            currentUser = null;
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        // Загрузка чатов
        async function loadChats() {
            if (!currentUser) return;

            const { data: chats, error } = await supabase
                .from('chat_members')
                .select(`
                    chat_id,
                    chats:chat_id (
                        *,
                        chat_members!inner (
                            user_id,
                            users:user_id (nickname, avatar_url)
                        )
                    )
                `)
                .eq('user_id', currentUser.id);

            if (error) {
                console.error(error);
                return;
            }

            const chatsList = document.getElementById('chatsList');
            chatsList.innerHTML = '';

            for (const item of chats) {
                const chat = item.chats;
                let displayName = chat.name;
                let displayAvatar = chat.avatar_url;

                if (chat.type === 'private') {
                    const otherMember = chat.chat_members.find(m => m.user_id !== currentUser.id);
                    if (otherMember && otherMember.users) {
                        displayName = otherMember.users.nickname;
                        displayAvatar = otherMember.users.avatar_url;
                    }
                }

                const chatElement = document.createElement('div');
                chatElement.className = 'chat-item' + (currentChat?.id === chat.id ? ' active' : '');
                chatElement.innerHTML = `
                    <img class="chat-avatar" src="${displayAvatar || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(displayName)}`}">
                    <div class="chat-details">
                        <div class="chat-name">${displayName}</div>
                        <div class="chat-last-message">${chat.type === 'group' ? 'Группа' : 'Личный чат'}</div>
                    </div>
                `;
                chatElement.onclick = () => selectChat(chat.id, displayName, chat.type);
                chatsList.appendChild(chatElement);
            }

            // Кнопка создания чата/группы
            const addButton = document.createElement('div');
            addButton.className = 'chat-item';
            addButton.innerHTML = `
                <div class="chat-details">
                    <div class="chat-name">➕ Новый чат</div>
                </div>
            `;
            addButton.onclick = () => showCreateGroupModal();
            chatsList.appendChild(addButton);
        }

        // Загрузка друзей
        async function loadFriends() {
            if (!currentUser) return;

            const { data: friends, error } = await supabase
                .from('friends')
                .select(`
                    *,
                    friend:friend_id (*),
                    user:user_id (*)
                `)
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');

            if (error) {
                console.error(error);
                return;
            }

            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = '';

            for (const friend of friends) {
                const friendData = friend.friend_id === currentUser.id ? friend.user : friend.friend;

                const friendElement = document.createElement('div');
                friendElement.className = 'chat-item';
                friendElement.innerHTML = `
                    <img class="chat-avatar" src="${friendData.avatar_url || `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(friendData.nickname)}`}">
                    <div class="chat-details">
                        <div class="chat-name">${friendData.nickname}</div>
                        <div class="chat-last-message">Нажмите для чата</div>
                    </div>
                `;
                friendElement.onclick = () => createPrivateChat(friendData.id, friendData.nickname);
                friendsList.appendChild(friendElement);
            }

            // Кнопка добавления друга
            const addButton = document.createElement('div');
            addButton.className = 'chat-item';
            addButton.innerHTML = `
                <div class="chat-details">
                    <div class="chat-name">➕ Добавить друга</div>
                </div>
            `;
            addButton.onclick = () => showAddFriendModal();
            friendsList.appendChild(addButton);
        }

        // Создание личного чата
        async function createPrivateChat(userId, nickname) {
            // Проверяем, существует ли уже чат
            const { data: existing, error } = await supabase
                .from('chat_members')
                .select('chat_id')
                .eq('user_id', currentUser.id);

            if (existing) {
                for (const item of existing) {
                    const { data: members } = await supabase
                        .from('chat_members')
                        .select('user_id')
                        .eq('chat_id', item.chat_id);

                    if (members && members.length === 2 && members.some(m => m.user_id === userId)) {
                        selectChat(item.chat_id, nickname, 'private');
                        return;
                    }
                }
            }

            // Создаем новый чат
            const { data: chat, error: chatError } = await supabase
                .from('chats')
                .insert([{
                    type: 'private',
                    created_by: currentUser.id
                }])
                .select()
                .single();

            if (chatError) {
                alert('Ошибка создания чата');
                return;
            }

            // Добавляем участников
            await supabase
                .from('chat_members')
                .insert([
                    { chat_id: chat.id, user_id: currentUser.id },
                    { chat_id: chat.id, user_id: userId }
                ]);

            selectChat(chat.id, nickname, 'private');
            loadChats();
        }

        // Выбор чата
        async function selectChat(chatId, name, type) {
            currentChat = { id: chatId, name: name, type: type };
            document.getElementById('currentChatName').textContent = name;

            if (type === 'group') {
                document.getElementById('groupControls').style.display = 'block';
            } else {
                document.getElementById('groupControls').style.display = 'none';
            }

            // Подписываемся на новые сообщения
            if (messagesSubscription) {
                messagesSubscription.unsubscribe();
            }

            messagesSubscription = supabase
                .channel(`chat:${chatId}`)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, payload => {
                    addMessageToUI(payload.new);
                })
                .subscribe();

            loadMessages(chatId);
        }

        // Загрузка сообщений
        async function loadMessages(chatId) {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*, user:user_id(nickname, avatar_url)')
                .eq('chat_id', chatId)
                .eq('is_deleted', false)
                .order('created_at', { ascending: true });

            if (error) {
                console.error(error);
                return;
            }

            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            for (const msg of messages) {
                addMessageToUI(msg);
            }
        }

        // Добавление сообщения в UI
        function addMessageToUI(message) {
            const container = document.getElementById('messagesContainer');
            const isOwn = message.user_id === currentUser.id;

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'message-sent' : 'message-received'}`;

            let content = `<div class="message-content">${escapeHtml(message.content || '')}</div>`;

            if (message.file_url) {
                if (message.message_type === 'photo') {
                    content += `<img class="message-media" src="${message.file_url}" onclick="window.open('${message.file_url}')">`;
                } else if (message.message_type === 'video') {
                    content += `<video class="message-media" controls src="${message.file_url}"></video>`;
                }
            }

            content += `<div class="message-time">${new Date(message.created_at).toLocaleTimeString()}</div>`;
            messageDiv.innerHTML = content;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Отправка сообщения
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !currentChat) return;

            const { error } = await supabase
                .from('messages')
                .insert([{
                    chat_id: currentChat.id,
                    user_id: currentUser.id,
                    content: content,
                    message_type: 'text'
                }]);

            if (error) {
                alert('Ошибка отправки: ' + error.message);
            } else {
                input.value = '';
            }
        }

        // Отправка файла
        async function sendFile(input) {
            if (!currentChat || !input.files[0]) return;

            const file = input.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random()}.${fileExt}`;
            const filePath = `chat_files/${fileName}`;

            const { data, error } = await supabase.storage
                .from('chat-files')
                .upload(filePath, file);

            if (error) {
                alert('Ошибка загрузки файла');
                return;
            }

            const { data: { publicUrl } } = supabase.storage
                .from('chat-files')
                .getPublicUrl(filePath);

            const messageType = file.type.startsWith('image/') ? 'photo' : 'video';

            await supabase
                .from('messages')
                .insert([{
                    chat_id: currentChat.id,
                    user_id: currentUser.id,
                    message_type: messageType,
                    file_url: publicUrl,
                    file_size: file.size
                }]);

            input.value = '';
        }

        // Удаление чата
        async function deleteCurrentChat() {
            if (!currentChat) return;

            if (confirm('Удалить этот чат?')) {
                await supabase
                    .from('deleted_chats')
                    .insert([{
                        user_id: currentUser.id,
                        chat_id: currentChat.id
                    }]);

                currentChat = null;
                document.getElementById('messagesContainer').innerHTML = '';
                document.getElementById('currentChatName').textContent = 'Выберите чат';
                loadChats();
            }
        }

        // Создание/редактирование группы
        function showCreateGroupModal() {
            document.getElementById('groupModalTitle').textContent = 'Создать группу';
            document.getElementById('groupName').value = '';
            document.getElementById('groupMembers').value = '';
            document.getElementById('groupModal').style.display = 'flex';
        }

        async function createOrUpdateGroup() {
            const name = document.getElementById('groupName').value;
            const membersStr = document.getElementById('groupMembers').value;

            if (!name) {
                alert('Введите название группы');
                return;
            }

            const memberNicknames = membersStr.split(',').map(n => n.trim()).filter(n => n);

            // Получаем ID участников
            const { data: users, error } = await supabase
                .from('users')
                .select('id, nickname')
                .in('nickname', [currentUser.profile.nickname, ...memberNicknames]);

            if (error) {
                alert('Ошибка поиска пользователей');
                return;
            }

            // Создаем группу
            const { data: chat, error: chatError } = await supabase
                .from('chats')
                .insert([{
                    name: name,
                    type: 'group',
                    created_by: currentUser.id,
                    avatar_url: `https://ui-avatars.com/api/?background=667eea&color=fff&name=${encodeURIComponent(name)}`
                }])
                .select()
                .single();

            if (chatError) {
                alert('Ошибка создания группы');
                return;
            }

            // Добавляем участников
            const members = users.map(u => ({ chat_id: chat.id, user_id: u.id, role: u.id === currentUser.id ? 'admin' : 'member' }));
            await supabase.from('chat_members').insert(members);

            closeGroupModal();
            loadChats();
            alert('Группа создана!');
        }

        async function editGroup() {
            if (!currentChat || currentChat.type !== 'group') return;

            const { data: chat } = await supabase
                .from('chats')
                .select('*')
                .eq('id', currentChat.id)
                .single();

            document.getElementById('groupModalTitle').textContent = 'Редактировать группу';
            document.getElementById('groupName').value = chat.name;
            document.getElementById('groupMembers').value = '';
            document.getElementById('groupModal').style.display = 'flex';

            // Сохраняем функцию для обновления
            window.updateGroup = async () => {
                const newName = document.getElementById('groupName').value;
                const newMembers = document.getElementById('groupMembers').value;

                await supabase.from('chats').update({ name: newName }).eq('id', currentChat.id);

                if (newMembers) {
                    const memberNicknames = newMembers.split(',').map(n => n.trim());
                    const { data: users } = await supabase
                        .from('users')
                        .select('id')
                        .in('nickname', memberNicknames);

                    if (users) {
                        for (const user of users) {
                            await supabase
                                .from('chat_members')
                                .insert([{ chat_id: currentChat.id, user_id: user.id }])
                                .onConflict('chat_id, user_id')
                                .ignore();
                        }
                    }
                }

                closeGroupModal();
                loadChats();
                alert('Группа обновлена');
            };
        }

        async function addMemberToGroup() {
            const nickname = prompt('Введите никнейм пользователя:');
            if (!nickname || !currentChat) return;

            const { data: user } = await supabase
                .from('users')
                .select('id')
                .eq('nickname', nickname)
                .single();

            if (user) {
                await supabase
                    .from('chat_members')
                    .insert([{ chat_id: currentChat.id, user_id: user.id }]);
                alert('Пользователь добавлен');
            } else {
                alert('Пользователь не найден');
            }
        }

        // Система друзей
        async function addFriend() {
            const nickname = document.getElementById('friendNickname').value;
            if (!nickname) return;

            const { data: user } = await supabase
                .from('users')
                .select('id')
                .eq('nickname', nickname)
                .single();

            if (!user) {
                alert('Пользователь не найден');
                return;
            }

            const { error } = await supabase
                .from('friends')
                .insert([{
                    user_id: currentUser.id,
                    friend_id: user.id,
                    status: 'pending'
                }]);

            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                alert('Заявка отправлена');
                closeFriendModal();
            }
        }

        // Смена аватара
        async function changeAvatar() {
            document.getElementById('avatarModal').style.display = 'flex';
        }

        async function uploadAvatar(input) {
            if (!input.files[0]) return;

            const file = input.files[0];
            const fileName = `avatars/${currentUser.id}_${Date.now()}.jpg`;

            const { error } = await supabase.storage
                .from('avatars')
                .upload(fileName, file);

            if (error) {
                alert('Ошибка загрузки');
                return;
            }

            const { data: { publicUrl } } = supabase.storage
                .from('avatars')
                .getPublicUrl(fileName);

            await supabase
                .from('users')
                .update({ avatar_url: publicUrl })
                .eq('id', currentUser.id);

            document.getElementById('userAvatar').src = publicUrl;
            closeAvatarModal();
            loadChats();
        }

        // Вспомогательные функции
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('chatsList').style.display = tab === 'chats' ? 'block' : 'none';
            document.getElementById('friendsList').style.display = tab === 'friends' ? 'block' : 'none';

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function searchChats() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeAvatarModal() { document.getElementById('avatarModal').style.display = 'none'; }
        function closeGroupModal() { document.getElementById('groupModal').style.display = 'none'; }
        function closeFriendModal() { document.getElementById('addFriendModal').style.display = 'none'; }
        function showAddFriendModal() { document.getElementById('addFriendModal').style.display = 'flex'; }

        // Инициализация
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') {
                logout();
            }
        });
    </script>
</body>
</html>
