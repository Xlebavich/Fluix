<!DOCTYPE html>
<html>
<head>
    <title>Мой Мессенджер</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .chat { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; }
        .header p { opacity: 0.9; margin-top: 5px; font-size: 14px; }
        .messages { height: 500px; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { background: white; padding: 12px 18px; margin-bottom: 12px; border-radius: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .username { font-weight: bold; color: #667eea; margin-bottom: 5px; font-size: 14px; }
        .content { color: #333; font-size: 16px; word-wrap: break-word; }
        .time { font-size: 11px; color: #999; margin-top: 5px; }
        .input-area { display: flex; padding: 20px; background: white; gap: 10px; border-top: 1px solid #e0e0e0; }
        input[type="text"] { flex: 1; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; outline: none; font-size: 14px; transition: border 0.3s; }
        input[type="text"]:focus { border-color: #667eea; }
        #username { flex: 0.3; min-width: 120px; }
        button { padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.02); }
        .status { text-align: center; padding: 10px; font-size: 12px; color: #667eea; background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <h1>💬 Мой Мессенджер</h1>
            <p>Работает в реальном времени на Supabase</p>
        </div>
        <div class="messages" id="messages">
            <div style="text-align: center; color: #999; padding: 20px;">Загрузка сообщений...</div>
        </div>
        <div class="input-area">
            <input type="text" id="username" placeholder="Ваше имя" value="Аноним">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤 Отправить</button>
        </div>
        <div class="status" id="status">✅ Онлайн | Сообщения обновляются автоматически</div>
    </div>

    <script>
        // ТВОЙ КЛЮЧ ИЗ SUPABASE (найди в Settings -> API)
        const SUPABASE_URL = 'https://xxqvsnxcudrwoyofjnie.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4cXZzbnhjdWRyd295b2ZqbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDk3MzMsImV4cCI6MjA5MTIyNTczM30.p6ryAFSevRpZKBQ7m0PSw7POPnIaD3TbtPMEcKfIeRI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                document.getElementById('messages').innerHTML = '<div style="text-align: center; color: red; padding: 20px;">❌ Ошибка загрузки: ' + error.message + '</div>';
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('messages').innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">💬 Нет сообщений. Напишите первое!</div>';
                return;
            }

            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = data.map(m => `
                <div class="message">
                    <div class="username">${escapeHtml(m.username || 'Аноним')}</div>
                    <div class="content">${escapeHtml(m.content)}</div>
                    <div class="time">${new Date(m.created_at).toLocaleTimeString()}</div>
                </div>
            `).join('');

            // Автоскролл вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const username = document.getElementById('username').value || 'Аноним';
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            const { error } = await supabase.from('messages').insert({
                content: content,
                username: username
            });

            if (error) {
                alert('Ошибка отправки: ' + error.message);
                return;
            }

            input.value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Подписка на новые сообщения (Realtime)
        const channel = supabase
            .channel('messages-channel')
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages' },
                (payload) => {
                    console.log('Новое сообщение:', payload);
                    loadMessages(); // Перезагружаем все сообщения
                }
            )
            .subscribe((status) => {
                console.log('Realtime статус:', status);
                if (status === 'SUBSCRIBED') {
                    document.getElementById('status').innerHTML = '✅ Онлайн | Realtime подключен';
                }
            });

        // Загружаем сообщения при старте
        loadMessages();
    </script>
</body>
</html>
